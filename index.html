<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NSP THAI - Endurance Monitoring V17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card-custom { background-color: #161b2c; border: 1px solid #2d3748; border-radius: 8px; }
        .input-custom { background-color: #1a202c; border: 1px solid #334155; color: #fff; border-radius: 4px; width: 100%; padding: 6px 10px; font-size: 13px; outline: none; transition: border 0.2s; }
        .input-custom:focus { border-color: #3b82f6; }
        .label-custom { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; display: block; }
        .kpi-card { border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .loading-screen { position: fixed; inset: 0; background: #0b0f1a; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="p-3 md:p-6">
    <div id="loader" class="loading-screen">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-blue-500 mb-4"></div>
        <p class="text-blue-400 font-bold text-[10px] tracking-widest uppercase">Connecting to Firebase...</p>
    </div>

    <div class="flex justify-between items-start mb-6">
        <div class="flex items-center gap-4">
            <div class="text-3xl font-black italic tracking-tighter"><span class="text-blue-600">N</span>SP <span class="text-gray-500 font-light text-xl">THAI</span></div>
            <div>
                <h1 class="text-blue-500 font-bold text-lg md:text-xl uppercase leading-none">Endurance Test <span class="text-white font-medium">Condition & Result</span></h1>
                <p id="sync-status" class="text-[9px] text-emerald-500 font-bold tracking-tighter uppercase mt-1 italic"><i class="fas fa-circle text-[6px] animate-pulse"></i> System Live Sync</p>
            </div>
        </div>
        <div id="clock" class="hidden md:block text-gray-400 font-mono text-sm bg-gray-900/50 px-4 py-1 rounded border border-gray-800">--:--:--</div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div class="kpi-card bg-blue-600/10 border-blue-600/30"><p class="label-custom !color-blue-400">ทั้งหมด</p><p id="stat-total" class="text-2xl font-bold text-blue-500">0</p></div>
        <div class="kpi-card bg-yellow-600/10 border-yellow-600/30"><p class="label-custom !color-yellow-400">กำลังรัน</p><p id="stat-running" class="text-2xl font-bold text-yellow-500">0</p></div>
        <div class="kpi-card bg-green-600/10 border-green-600/30"><p class="label-custom !color-green-400">Finished</p><p id="stat-finished" class="text-2xl font-bold text-green-500">0</p></div>
        <div class="kpi-card bg-gray-600/10 border-gray-600/30"><p class="label-custom">รอเริ่ม</p><p id="stat-waiting" class="text-2xl font-bold text-gray-400">0</p></div>
        <div class="kpi-card bg-cyan-600/10 border-cyan-600/30"><p class="label-custom !color-cyan-400">Pass</p><p id="stat-pass" class="text-2xl font-bold text-cyan-500">0</p></div>
    </div>

    <div class="card-custom p-5 mb-6 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
        <h2 class="mb-4 font-bold text-xs flex items-center gap-2 text-gray-300 uppercase tracking-widest"><i class="fas fa-edit text-blue-500"></i> บันทึกข้อมูลการทดสอบ</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4">
            <div><label class="label-custom">Tester Machine</label><select id="in-machine" class="input-custom"><option>No1</option><option>No2</option></select></div>
            <div><label class="label-custom">Customer</label><input type="text" id="in-customer" class="input-custom"></div>
            <div><label class="label-custom">Part No.</label><input type="text" id="in-partno" class="input-custom"></div>
            <div><label class="label-custom">PCS (Quantity)</label><input type="number" id="in-pcs" class="input-custom" value="1" oninput="calc()"></div>
            <div><label class="label-custom">Lot No.</label><input type="text" id="in-lot" class="input-custom"></div>
            <div><label class="label-custom text-blue-400">Stroke (Auto)</label><input type="text" id="out-stroke" class="input-custom bg-blue-900/20 text-blue-400 font-bold" readonly value="0.00"></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4">
            <div><label class="label-custom">Free Length</label><input type="number" id="in-free" class="input-custom" step="0.01" oninput="calc()"></div>
            <div><label class="label-custom text-yellow-500">L1 (mm)</label><input type="number" id="in-l1" class="input-custom" step="0.01" oninput="calc()"></div>
            <div><label class="label-custom text-yellow-500">L2 (mm)</label><input type="number" id="in-l2" class="input-custom" step="0.01" oninput="calc()"></div>
            <div><label class="label-custom">SP Rate</label><input type="number" id="in-rate" class="input-custom" step="0.01" oninput="calc()"></div>
            <div><label class="label-custom text-emerald-400 font-bold">Load Max (Auto)</label><input type="text" id="out-load" class="input-custom bg-emerald-900/10 text-emerald-400 font-bold" readonly value="0.00"></div>
            <div><label class="label-custom">Speed (C/min)</label><input type="number" id="in-speed" class="input-custom" value="500"></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div><label class="label-custom">Total Cycle</label><input type="number" id="in-total" class="input-custom" value="1200000"></div>
            <div><label class="label-custom">Start Date</label><input type="date" id="in-date" class="input-custom"></div>
            <div class="flex gap-2">
                <div class="flex-1"><label class="label-custom">HR</label><input type="number" id="in-hr" class="input-custom" value="08" min="0" max="23"></div>
                <div class="flex-1"><label class="label-custom">MIN</label><input type="number" id="in-min" class="input-custom" value="00" min="0" max="59"></div>
            </div>
            <div class="flex items-end gap-2">
                <button id="btn-add" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded text-xs uppercase shadow-lg transition-all">เริ่มบันทึกงาน</button>
                <button onclick="resetForm()" class="bg-gray-700 px-4 py-2 rounded text-xs font-bold">ล้าง</button>
            </div>
        </div>
    </div>

    <div class="card-custom overflow-hidden shadow-2xl mb-8">
        <div class="p-3 bg-gray-800/30 text-[10px] font-bold text-emerald-400 uppercase tracking-widest border-b border-gray-800 flex justify-between items-center">
            <span><i class="fas fa-satellite-dish mr-2"></i> Active Monitoring</span>
            <span id="update-timer" class="text-gray-600 font-mono">Real-time</span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-800/50 text-gray-500 uppercase text-[9px] tracking-widest">
                    <tr>
                        <th class="p-4">Machine</th><th class="p-4">Part No</th><th class="p-4 text-center">Info</th><th class="p-4 text-center">Load Max</th><th class="p-4 w-1/4">Progress</th><th class="p-4">Finish Date</th><th class="p-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="running-table" class="divide-y divide-gray-800"></tbody>
            </table>
        </div>
    </div>

    <div class="card-custom p-5">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-xs flex items-center gap-2 uppercase tracking-widest text-yellow-500"><i class="fas fa-history"></i> ประวัติงานล่าสุด</h2>
            <button onclick="exportExcel()" class="text-emerald-500 text-[10px] font-bold border border-emerald-500/30 px-3 py-1 rounded hover:bg-emerald-500 hover:text-white transition-all uppercase">Export Excel</button>
        </div>
        <div class="overflow-x-auto max-h-[300px]">
            <table class="w-full text-left text-[10px] text-gray-500">
                <tbody id="history-table" class="divide-y divide-gray-800/50"></tbody>
            </table>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/90 z-[1000] hidden items-center justify-center p-4" onclick="closeModal()">
        <div class="card-custom max-w-sm w-full p-6 border-t-4 border-blue-500 shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-blue-400 font-bold mb-4 uppercase text-[10px] tracking-widest border-b border-gray-800 pb-2">Technical Details</h3>
            <div id="modalContent" class="space-y-3 text-xs"></div>
            <button onclick="closeModal()" class="w-full mt-6 bg-blue-600 py-2 rounded font-bold text-xs uppercase tracking-tighter">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</body>
</html>
