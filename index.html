<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NSP THAI - Cloud Persistent V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-2 md:p-8 bg-[#0b0f1a]">

    <div id="loader" class="loading-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-500 mb-4"></div>
        <p class="text-blue-400 font-bold text-xs tracking-widest uppercase">Syncing Cloud Data...</p>
    </div>

    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b border-gray-800 pb-4">
        <div class="flex items-center gap-3">
            <div class="logo-container text-2xl">
                <span class="text-blue-500 font-black">N</span><span class="text-white font-black">S</span><span class="text-blue-500 font-black">P</span>
                <span class="text-gray-500 font-light text-lg ml-1">THAI</span>
            </div>
            <div class="h-8 w-[1px] bg-gray-700 mx-1"></div>
            <div>
                <h1 class="text-sm md:text-lg font-bold text-white uppercase tracking-tight">Endurance Cloud</h1>
                <div class="flex items-center gap-2">
                    <span id="save-indicator" class="text-[8px] text-emerald-500 font-bold flex items-center gap-1 uppercase">
                        <i class="fas fa-check-circle"></i> Connected
                    </span>
                    <span id="last-save-time" class="text-[8px] text-gray-500">Wait sync...</span>
                </div>
            </div>
        </div>
        <div id="clock" class="text-gray-400 font-mono bg-[#161b2c] px-4 py-1.5 rounded-lg border border-gray-800 text-sm">--:--:--</div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div class="card-kpi border-l-4 border-blue-500">
            <p class="label-custom">Total</p><p id="stat-total" class="stat-val text-blue-500">0</p>
        </div>
        <div class="card-kpi border-l-4 border-yellow-500">
            <p class="label-custom">Running</p><p id="stat-running" class="stat-val text-yellow-500">0</p>
        </div>
        <div class="card-kpi border-l-4 border-green-500">
            <p class="label-custom">Finished</p><p id="stat-finished" class="stat-val text-green-500">0</p>
        </div>
        <div class="card-kpi border-l-4 border-gray-500">
            <p class="label-custom">Waiting</p><p id="stat-waiting" class="stat-val text-gray-400">0</p>
        </div>
        <div class="card-kpi border-l-4 border-cyan-500">
            <p class="label-custom">Pass</p><p id="stat-pass" class="stat-val text-cyan-500">0</p>
        </div>
    </div>

    <div class="card-custom p-4 md:p-6 mb-6 shadow-2xl overflow-hidden relative">
        <div class="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
        <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-4">
            <div class="col-span-2 md:col-span-1">
                <label class="label-custom">Machine</label>
                <select id="in-machine" class="input-custom"><option>No.1</option><option>No.2</option></select>
            </div>
            <div><label class="label-custom">Customer</label><input type="text" id="in-customer" class="input-custom"></div>
            <div><label class="label-custom">Part No.</label><input type="text" id="in-partno" class="input-custom"></div>
            <div><label class="label-custom">PCS</label><input type="number" id="in-pcs" class="input-custom" value="1" oninput="calcLogic()"></div>
            <div><label class="label-custom">Lot No.</label><input type="text" id="in-lot" class="input-custom"></div>
            <div><label class="label-custom">Stroke</label><input type="text" id="out-stroke" class="input-custom bg-blue-900/20 text-blue-400 font-bold" readonly value="0.00"></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="col-span-2 md:col-span-1 grid grid-cols-2 gap-2">
                <div><label class="label-custom">L1</label><input type="number" id="in-l1" class="input-custom border-yellow-900" oninput="calcLogic()"></div>
                <div><label class="label-custom">L2</label><input type="number" id="in-l2" class="input-custom border-yellow-900" oninput="calcLogic()"></div>
            </div>
            <div><label class="label-custom">Freeleght</label>
                <div class="flex gap-1">
                    <input type="number" id="in-free" class="input-custom text-[10px]" placeholder="Free" oninput="calcLogic()">
                    <input type="number" id="in-rate" class="input-custom text-[10px]" placeholder="Rate" oninput="calcLogic()">
                </div>
            </div>
            <div><label class="label-custom text-emerald-400">Load Max</label><input type="text" id="out-load" class="input-custom bg-emerald-900/10 text-emerald-400 font-bold" readonly value="0.00"></div>
            <div><label class="label-custom">Speed/Total</label>
                <div class="flex gap-1">
                    <input type="number" id="in-speed" class="input-custom text-[10px]" value="500">
                    <input type="number" id="in-total" class="input-custom text-[10px]" value="1200000">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="col-span-2 md:col-span-1"><label class="label-custom">Start Date</label><input type="date" id="in-date" class="input-custom bg-gray-800"></div>
            <div class="grid grid-cols-2 gap-2">
                <div><label class="label-custom">HR</label><input type="number" id="in-hr" class="input-custom" value="08"></div>
                <div><label class="label-custom">MIN</label><input type="number" id="in-min" class="input-custom" value="00"></div>
            </div>
            <div class="col-span-2 flex gap-2 pt-2">
                <button onclick="addTask()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-lg text-xs uppercase tracking-widest">Add Job</button>
                <button onclick="resetForm()" class="bg-gray-700 px-4 rounded-lg text-xs font-bold uppercase">Clear</button>
            </div>
        </div>
    </div>

    <div class="card-custom overflow-hidden mb-8 shadow-2xl">
        <div class="p-3 bg-gray-800/30 flex justify-between items-center border-b border-gray-800">
            <h3 class="font-bold text-emerald-400 text-[10px] uppercase tracking-widest flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                Running Monitor
            </h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs">
                <thead class="bg-gray-800/50 text-gray-400 uppercase text-[9px] tracking-widest">
                    <tr>
                        <th class="p-3">M/C</th><th class="p-3">Part No</th><th class="p-3">Info</th><th class="p-3">Load</th><th class="p-3 w-1/4">Progress</th><th class="p-3">Finish</th><th class="p-3">DEL</th>
                    </tr>
                </thead>
                <tbody id="running-table" class="divide-y divide-gray-800"></tbody>
            </table>
        </div>
    </div>

    <div class="card-custom p-4 shadow-2xl border-t border-yellow-600/20 mb-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-3">
            <h2 class="font-bold text-sm flex items-center gap-2"><i class="fas fa-history text-yellow-500"></i> History</h2>
            <div class="flex gap-1">
                <select id="hist-month" class="input-custom !py-1 !text-[10px] !w-24"></select>
                <button onclick="exportExcel()" class="bg-emerald-600 px-3 py-1 rounded text-[10px] font-bold shadow-lg flex items-center gap-1">
                    <i class="fas fa-file-excel"></i> EXCEL
                </button>
            </div>
        </div>
        <div class="overflow-x-auto max-h-[300px]">
            <table class="w-full text-left text-[10px]">
                <tbody id="history-table" class="divide-y divide-gray-800 opacity-60"></tbody>
            </table>
        </div>
    </div>

    <div id="detailModal" class="modal-overlay hidden" onclick="closeModal()">
        <div class="card-custom w-[90%] max-w-sm p-6 relative animate-scale-in border-t-4 border-blue-500" onclick="event.stopPropagation()">
            <h3 class="text-blue-400 font-bold border-b border-gray-700 pb-2 mb-4 text-xs uppercase tracking-widest">Job Details</h3>
            <div id="modalContent" class="space-y-3"></div>
            <button onclick="closeModal()" class="w-full mt-6 bg-blue-600 py-2 rounded-lg font-bold text-xs uppercase">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
